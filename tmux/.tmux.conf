# ~/.tmux.conf
# Adapted from https://github.com/Writtic/dotrc/blob/master/tmux.conf
#
# Hierarchy: Server -> Session -> Window -> Pane
# Option types: session (set [-g]), window (setw [-g]), binding (bind)

# -----------------------------------------------------------------------------
# Session options
# -----------------------------------------------------------------------------
# Prefix: Ctrl-a (frees Ctrl-b for vim/emacs page movement)
unbind-key C-b
set -g prefix C-a

# Window / pane indexing from 1; renumber on close
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# History & timing
set -g history-limit 102400
set -g repeat-time 500
set -sg escape-time 0

# Default shell + terminal
set-option -g default-shell /bin/zsh
set -g default-terminal "screen-256color"

# Key-binding style in status line (prefix :)
set -g status-keys emacs

# Mouse on
set -g mouse on

# -----------------------------------------------------------------------------
# Window options
# -----------------------------------------------------------------------------
setw -g mode-keys vi

# -----------------------------------------------------------------------------
# Key bindings
# -----------------------------------------------------------------------------
# New window / split panes preserve current path
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Prefix twice: last window; prefix a: send C-a through
bind C-a last-window
bind a send-prefix

# Window movement / swap
bind -r > swap-window -t :+
bind -r < swap-window -t :-
bind Space next-window
bind BSpace previous-window
bind / next-layout

# Pane movement (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Tab select-pane -t :.+
bind BTab select-pane -t :.-

# Pane resize (repeatable)
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Synchronize panes (toggle)
bind * setw synchronize-panes

# Reload config
bind R source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Join / send pane (custom from original)
bind-key J command-prompt -p "join pane from:" "join-pane -s '%%'"
bind-key S command-prompt -p "send pane to:"   "join-pane -t '%%'"

# copy-mode (tmux 2.4+ / 3.x syntax)
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
unbind-key -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

# Capture scrollback to tmpfile and open in vim
bind C-c run "tmux capture-pane -S -102400 -p > /tmp/tmux-capture.txt" \;\
         new-window "vim /tmp/tmux-capture.txt"

# macOS: screenshot current iTerm2 window (requires iTerm2 + screencapture)
if-shell "uname | grep -q Darwin" \
	"bind M-c run \"screencapture -l$(osascript -e 'tell app \\\"iTerm2\\\" to id of window 1') -x -o -P /tmp/$(date +%Y%m%d-%H%M%S).png\""

# -----------------------------------------------------------------------------
# Status line (tmux-powerline via TPM; see plugins below)
# -----------------------------------------------------------------------------
set -g status-justify "left"
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# tmux-powerline installed by TPM to ~/.tmux/plugins/tmux-powerline/
set -g status-left  "#(~/.tmux/plugins/tmux-powerline/powerline.sh left)"
set -g status-right "#(~/.tmux/plugins/tmux-powerline/powerline.sh right)"

# Colors (tmux 2.9+ style options)
set -g status-style "bg=colour237,fg=colour250"
set -g pane-active-border-style "fg=colour240"
set -g pane-border-style        "fg=colour238"

setw -g window-status-format         '#[bg=colour238,fg=colour107] #I #[bg=colour239,fg=colour110] #[bg=colour240]#W#[bg=colour239,fg=colour195]#F#[bg=colour238] '
setw -g window-status-current-format '#[bg=colour236,fg=colour215] #I #[bg=colour235,fg=colour167] #[bg=colour234]#W#[bg=colour235] #[fg=colour195]#F#[bg=colour236] '

# -----------------------------------------------------------------------------
# Plugins (TPM)
#   prefix + I -> install,  prefix + U -> update,  prefix + alt-u -> clean
# -----------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'erikw/tmux-powerline'

# Plugin options
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
